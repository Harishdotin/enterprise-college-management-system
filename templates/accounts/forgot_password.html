{% extends 'base.html' %}

{% block title %}Reset Password | College Management System{% endblock %}

{% block body_content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 class="auth-title">Reset Password</h2>
            <p class="auth-subtitle">Enter your registered email address to receive reset instructions.</p>
        </div>

        <form method="POST" action="{% url 'forgot_password' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <div class="input-container">
                    <input type="email" name="email" id="email" class="form-input" placeholder="e.g. name@college.edu" required autofocus>
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-bottom: 20px;">
                <span>Send Reset Link</span>
                <i class="fa-solid fa-paper-plane"></i>
            </button>

            <div style="text-align: center;">
                <a href="{% url 'login' %}" class="back-link">
                    <i class="fa-solid fa-arrow-left" style="margin-right: 5px;"></i> Back to Login
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
